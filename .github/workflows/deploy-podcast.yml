name: Deploy Podcast

on:
  push:
    branches: [master]
    paths:
      - 'podcast/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild site data from series.json files
        run: node scripts/generate-site.js --audio-base "https://archive.org/download/temantuton-podcast/"

      - name: Remove audio files and commit
        run: |
          find podcast -name '*.m4a' -delete 2>/dev/null || true
          find podcast -name '*.mp3' -delete 2>/dev/null || true
          find podcast -name '*.ogg' -delete 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "auto: regenerate site & remove uploaded audio [skip ci]"
          git push